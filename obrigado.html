<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obrigado!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Fundo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('fundo.jpeg') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* Transparência */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .container {
      background: rgba(255, 255, 255);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    #logo {
      width: 120px;
      margin-bottom: 20px;
    }

    h2 {
      color: #11005e;
      margin-bottom: 10px;
    }

    p {
      color: #11005e;
      font-size: 14px;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 14px 20px;
      background: #11005e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
    }

    a:hover {
      background: #256628;
    }

    .extra {
      margin-top: 15px;
      font-size: 12px;
      color: #11005e;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header"> 
      <img src="logo_paz.png" alt="Logo Paz" id="logo">    
    </div>

    <h2>Obrigado! </h2>

    <p>
      Seu cadastro foi realizado com sucesso.<br>
      Preparamos um material especial com promessas bíblicas para fortalecer sua família 💛
    </p>

    <a href="Promessas.pdf" download>
       Receber Promessas para minha Família
    </a>

    

  </div>

</body>
</html>
